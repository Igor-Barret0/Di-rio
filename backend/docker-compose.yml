version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: diary_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: diary_user
      POSTGRES_PASSWORD: diary_pass
      POSTGRES_DB: diary_db
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U diary_user -d diary_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: diary_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: diary_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://diary_user:diary_pass@postgres:5432/diary_db
      REDIS_URL: redis://redis:6379
    ports:
      - "3001:3001"
    volumes:
      - ./logs:/app/logs

volumes:
  postgres_data:
  redis_data:
